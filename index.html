<!DOCTYPE html>
<html lang="ro">




  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogBook Soferi</title>
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LogBook">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f1117; color: #e8eaf0; min-height: 100vh; }
header { background: #181c27; border-bottom: 1px solid #2a3050; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 16px; font-weight: 700; color: #f5a623; letter-spacing: 1px; }
.logo span { color: #8892a4; font-weight: 400; }
select { background: #1e2336; border: 1px solid #2a3050; color: #e8eaf0; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
.cal-panel { background: #181c27; border-bottom: 1px solid #2a3050; padding: 16px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav button { background: #1e2336; border: 1px solid #2a3050; color: #e8eaf0; width: 36px; height: 36px; border-radius: 6px; font-size: 18px; cursor: pointer; }
.cal-month { font-size: 16px; font-weight: 700; color: #e8eaf0; }
.cal-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
.cal-table th { text-align: center; font-size: 10px; color: #555f72; padding: 4px 0; font-weight: 700; text-transform: uppercase; }
.cal-table td { text-align: center; background: #1e2336; border: 1px solid #2a3050; border-radius: 6px; padding: 6px 2px; cursor: pointer; min-width: 40px; height: 42px; vertical-align: middle; }
.cal-table td:hover { border-color: #f5a623; }
.cal-table td.other { opacity: 0.3; cursor: default; }
.cal-table td.other:hover { border-color: #2a3050; }
.cal-table td.worked { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); }
.cal-table td.selected { background: rgba(245,166,35,0.2) !important; border-color: #f5a623 !important; }
.cal-table td.weekend .dn { color: #8892a4; }
.cal-table td.worked .dn { color: #22c55e; }
.cal-table td.selected .dn { color: #f5a623 !important; }
.dn { font-size: 13px; font-weight: 700; color: #e8eaf0; display: block; }
.dc { font-size: 9px; color: rgba(34,197,94,0.8); display: block; }
.today-num { background: #f5a623; color: #000; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.cal-legend { margin-top: 12px; display: flex; gap: 14px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8892a4; }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }
.cal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.stat { background: #1e2336; border: 1px solid #2a3050; border-radius: 8px; padding: 10px 12px; }
.stat .sl { font-size: 10px; color: #555f72; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.stat .sv { font-size: 20px; font-weight: 700; color: #f5a623; font-family: monospace; }
.stat .ss { font-size: 10px; color: #555f72; }
.form-panel { padding: 16px; }
.form-date { font-size: 18px; font-weight: 700; color: #e8eaf0; }
.form-day { font-size: 12px; color: #8892a4; margin-top: 2px; margin-bottom: 14px; }
.worked-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.tbtn { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #2a3050; background: #1e2336; color: #8892a4; font-size: 14px; font-weight: 700; cursor: pointer; }
.tbtn.yes { background: rgba(34,197,94,0.12); border-color: #22c55e; color: #22c55e; }
.tbtn.no { background: rgba(239,68,68,0.08); border-color: #ef4444; color: #ef4444; }
.section { background: #181c27; border: 1px solid #2a3050; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
.sec-head { background: #1e2336; padding: 12px 14px; border-bottom: 1px solid #2a3050; font-size: 13px; font-weight: 700; color: #e8eaf0; }
.sec-body { padding: 14px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field label { display: block; font-size: 10px; font-weight: 700; color: #555f72; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.field input, .field textarea, .field select { width: 100%; background: #1e2336; border: 1px solid #2a3050; color: #e8eaf0; padding: 9px 10px; border-radius: 6px; font-size: 13px; font-family: Arial, sans-serif; outline: none; }
.field input:focus, .field textarea:focus { border-color: #f5a623; }
.field textarea { resize: vertical; min-height: 65px; }
.colete-wrap { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #2a3050; border-radius: 8px; overflow: hidden; }
.col-half { padding: 12px; }
.col-half:first-child { border-right: 1px solid #2a3050; background: rgba(239,68,68,0.04); }
.col-half:last-child { background: rgba(34,197,94,0.04); }
.col-half label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.col-half:first-child label { color: #f87171; }
.col-half:last-child label { color: #22c55e; }
.col-half input { width: 100%; background: transparent; border: 1px solid #2a3050; color: #e8eaf0; padding: 6px; border-radius: 6px; font-size: 22px; font-weight: 700; text-align: center; font-family: monospace; outline: none; }
.col-ratio { font-size: 10px; color: #555f72; text-align: center; margin-top: 5px; font-family: monospace; }
.loc-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.loc-item { display: flex; align-items: center; gap: 6px; background: #1e2336; border: 1px solid #2a3050; border-radius: 6px; padding: 6px 8px; }
.loc-item .ln { font-size: 11px; color: #555f72; width: 16px; text-align: center; flex-shrink: 0; }
.loc-item input { flex: 1; background: transparent; border: none; color: #e8eaf0; font-size: 13px; outline: none; }
.loc-item .ldel { background: none; border: none; color: #555f72; font-size: 18px; cursor: pointer; padding: 0 2px; }
.loc-item .ldel:hover { color: #ef4444; }
.add-loc { width: 100%; padding: 8px; background: #1e2336; border: 1px dashed #2a3050; border-radius: 6px; color: #555f72; font-size: 12px; cursor: pointer; text-align: center; }
.add-loc:hover { border-color: #f5a623; color: #f5a623; }
.stops-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 10px; }
.stop-chip { display: inline-flex; align-items: center; gap: 5px; background: #1e2336; border: 1px solid #2a3050; border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 12px; font-family: monospace; }
.stop-chip button { background: none; border: none; color: #555f72; cursor: pointer; font-size: 15px; }
.stop-chip button:hover { color: #ef4444; }
.stop-row { display: flex; gap: 8px; }
.stop-row input { flex: 1; background: #1e2336; border: 1px solid #2a3050; color: #e8eaf0; padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none; }
.stop-row input:focus { border-color: #f5a623; }
.stop-row button { background: #f5a623; border: none; color: #000; padding: 8px 14px; border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer; }
.save-bar { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #2a3050; }
.btn-save { background: #f5a623; border: none; color: #000; padding: 13px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; }
.btn-save:active { opacity: 0.85; }
.btn-clear { background: transparent; border: 1px solid #2a3050; color: #8892a4; padding: 11px; border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%; }
.btn-clear:hover { border-color: #ef4444; color: #ef4444; }
.empty { text-align: center; padding: 60px 20px; color: #555f72; }
.empty .ei { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.6; }
.toast { position: fixed; bottom: 20px; right: 16px; left: 16px; background: #22c55e; color: #000; padding: 12px 18px; border-radius: 8px; font-weight: 700; font-size: 14px; text-align: center; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 200; }
.toast.show { transform: translateY(0); opacity: 1; }
.sync-bar { background: #1e2336; border: 1px solid #2a3050; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: #8892a4; display: flex; align-items: center; gap: 8px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.sync-dot.syncing { background: #f5a623; animation: pulse 1s infinite; }
.sync-dot.error { background: #ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<header>
  <div class="logo">LOG<span>BOOK</span></div>
  <select id="driverSel" onchange="changeDriver()">
    <option value="s1">Sofer 1</option>
    <option value="s2">Sofer 2</option>
    <option value="s3">Sofer 3</option>
    <option value="s4">Sofer 4</option>
  </select>
</header>

<div class="cal-panel">
  <div class="cal-nav">
    <button onclick="prevMonth()">&#8249;</button>
    <div class="cal-month" id="calMonth"></div>
    <button onclick="nextMonth()">&#8250;</button>
  </div>
  <table class="cal-table" id="calTable"><tr><td style="color:white;padding:20px">TEST</td></tr></table>
  <div class="cal-legend">
    <div class="leg"><div class="leg-dot" style="background:rgba(34,197,94,0.4);border:1px solid rgba(34,197,94,0.6)"></div>Lucrata</div>
    <div class="leg"><div class="leg-dot" style="background:rgba(245,166,35,0.4);border:1px solid #f5a623"></div>Selectata</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623;border-radius:50%"></div>Azi</div>
  </div>
  <div class="cal-stats" id="calStats"></div>
</div>

<div id="formPanel">
  <div class="empty">
    <div class="ei">&#128197;</div>
    <p>Selecteaza o zi din calendar<br>pentru a completa sau vizualiza datele.</p>
  </div>
</div>

<div class="toast" id="toast">Zi salvata!</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2hQCMfdp7pk-w6e3FuEg2tNDYGf-9Kj7QRtTuU_O0q6uzKxGMGJ4LtTwiSyKHN_pp/exec';
var driver = 's1';
var viewYear, viewMonth;
var selDate = null;
var stops = [];
var locs = [];
var worked = false;
var store = {};

try { store = JSON.parse(localStorage.getItem('lb4') || '{}'); } catch(e) { store = {}; }

var MRO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
var DRO = ['Lun','Mar','Mie','Joi','Vin','Sam','Dum'];
var ZILE = ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];

window.onload = function() {
  var t = new Date();
  viewYear = t.getFullYear();
  viewMonth = t.getMonth();
  renderCal();
  syncFromSheets();
};

function pad(n) { return n < 10 ? '0'+n : ''+n; }
function ds(y, m, d) { return y + '-' + pad(m+1) + '-' + pad(d); }
function getDayData(dateStr) { return (store[driver] || {})[dateStr] || null; }

function changeDriver() {
  driver = document.getElementById('driverSel').value;
  renderCal();
  if (selDate) openDay(selDate);
  syncFromSheets();
}

// ── SYNC FROM SHEETS ──
function syncFromSheets() {
  fetch(SCRIPT_URL + '?sofer=' + driver)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok && res.data) {
        if (!store[driver]) store[driver] = {};
        Object.keys(res.data).forEach(function(k) {
          store[driver][k] = res.data[k];
        });
        try { localStorage.setItem('lb4', JSON.stringify(store)); } catch(e) {}
        renderCal();
        if (selDate) openDay(selDate);
      }
    })
    .catch(function() {});
}

// ── SAVE TO SHEETS ──
function saveToSheets(dateStr, dayData) {
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', sofer: driver, data: dateStr, dayData: dayData })
  }).catch(function() {});
}

function deleteFromSheets(dateStr) {
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', sofer: driver, data: dateStr })
  }).catch(function() {});
}

// ── CALENDAR ──
function renderCal() {
  document.getElementById('calMonth').textContent = MRO[viewMonth] + ' ' + viewYear;
  var today = new Date();
  var todayStr = ds(today.getFullYear(), today.getMonth(), today.getDate());
  var firstDow = new Date(viewYear, viewMonth, 1).getDay();
  firstDow = firstDow === 0 ? 6 : firstDow - 1;
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var prevDays = new Date(viewYear, viewMonth, 0).getDate();

  var html = '<thead><tr>';
  DRO.forEach(function(d) { html += '<th>' + d + '</th>'; });
  html += '</tr></thead><tbody><tr>';

  var cellCount = 0;

  for (var i = firstDow - 1; i >= 0; i--) {
    var d = prevDays - i;
    var m = viewMonth === 0 ? 11 : viewMonth - 1;
    var y = viewMonth === 0 ? viewYear - 1 : viewYear;
    html += makeCell(y, m, d, true, todayStr);
    cellCount++;
  }

  for (var d = 1; d <= daysInMonth; d++) {
    if (cellCount > 0 && cellCount % 7 === 0) html += '</tr><tr>';
    html += makeCell(viewYear, viewMonth, d, false, todayStr);
    cellCount++;
  }

  var rem = cellCount % 7 === 0 ? 0 : 7 - (cellCount % 7);
  var nm = viewMonth === 11 ? 0 : viewMonth + 1;
  var ny = viewMonth === 11 ? viewYear + 1 : viewYear;
  for (var d = 1; d <= rem; d++) {
    html += makeCell(ny, nm, d, true, todayStr);
  }
  html += '</tr></tbody>';
  document.getElementById('calTable').innerHTML = html;
  renderStats();
}

function makeCell(y, m, d, other, todayStr) {
  var dateStr = ds(y, m, d);
  var data = getDayData(dateStr);
  var dow = new Date(y, m, d).getDay();
  var isWeekend = dow === 0 || dow === 6;
  var isToday = dateStr === todayStr;
  var isSelected = dateStr === selDate;
  var isWorked = data && data.worked;

  var cls = '';
  if (other) cls += ' other';
  if (isWeekend) cls += ' weekend';
  if (isWorked) cls += ' worked';
  if (isSelected) cls += ' selected';

  var onclick = other ? '' : 'onclick="openDay(\'' + dateStr + '\')"';
  var numHtml = isToday && !isSelected
    ? '<span class="today-num">' + d + '</span>'
    : '<span class="dn">' + d + '</span>';

  var colHtml = (isWorked && data.colLiv) ? '<span class="dc">' + data.colLiv + 'c</span>' : '';

  return '<td class="' + cls + '" ' + onclick + '>' + numHtml + colHtml + '</td>';
}

function prevMonth() {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
  renderCal();
}
function nextMonth() {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
  renderCal();
}

function renderStats() {
  var prefix = viewYear + '-' + pad(viewMonth + 1);
  var driverData = store[driver] || {};
  var zile = 0, colete = 0, km = 0, ore = 0;
  Object.keys(driverData).forEach(function(k) {
    if (k.indexOf(prefix) === 0) {
      var data = driverData[k];
      if (data && data.worked) {
        zile++;
        colete += parseInt(data.colLiv || 0);
        km += parseInt(data.km || 0);
        if (data.oraS && data.oraE) {
          var s = data.oraS.split(':'); var e = data.oraE.split(':');
          var mins = (parseInt(e[0])*60+parseInt(e[1])) - (parseInt(s[0])*60+parseInt(s[1]));
          if (mins < 0) mins += 1440;
          ore += mins / 60;
        }
      }
    }
  });
  document.getElementById('calStats').innerHTML =
    '<div class="stat"><div class="sl">Zile lucrate</div><div class="sv">'+zile+'</div><div class="ss">luna curenta</div></div>' +
    '<div class="stat"><div class="sl">Colete livrate</div><div class="sv">'+colete+'</div><div class="ss">luna curenta</div></div>' +
    '<div class="stat"><div class="sl">Total KM</div><div class="sv">'+km+'</div><div class="ss">luna curenta</div></div>' +
    '<div class="stat"><div class="sl">Ore lucrate</div><div class="sv">'+ore.toFixed(1)+'</div><div class="ss">luna curenta</div></div>';
}

// ── FORM ──
function openDay(dateStr) {
  selDate = dateStr;
  renderCal();
  var parts = dateStr.split('-');
  var y = parts[0], m = parts[1], d = parts[2];
  var dateObj = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  var ziName = ZILE[dateObj.getDay()];
  var data = getDayData(dateStr) || {};
  stops = data.stops ? data.stops.slice() : [];
  locs = data.locs ? data.locs.slice() : [''];
  worked = data.worked || false;

  document.getElementById('formPanel').innerHTML =
    '<div class="form-panel">' +
    '<div class="sync-bar"><div class="sync-dot" id="syncDot"></div><span id="syncMsg">Date locale</span></div>' +
    '<div class="form-date">'+d+'.'+m+'.'+y+'</div>' +
    '<div class="form-day">'+ziName+'</div>' +
    '<div class="worked-toggle">' +
      '<button class="tbtn '+(worked?'yes':'')+'" id="btnDA" onclick="setWorked(true)">&#10003; Zi lucrata</button>' +
      '<button class="tbtn '+(worked?'':'no')+'" id="btnNU" onclick="setWorked(false)">&#10007; Zi nelucrata</button>' +
    '</div>' +
    '<div class="section"><div class="sec-head">&#9200; Timesheet</div><div class="sec-body">' +
      '<div class="row2"><div class="field"><label>Ora start</label><input type="time" id="oraS" value="'+(data.oraS||'')+'" oninput="calcOre()"></div>' +
      '<div class="field"><label>Ora sfarsit</label><input type="time" id="oraE" value="'+(data.oraE||'')+'" oninput="calcOre()"></div></div>' +
      '<div class="row2"><div class="field"><label>Ore lucrate</label><input type="text" id="oreL" value="'+(data.oreL||'')+'" readonly style="color:#f5a623;font-family:monospace"></div>' +
      '<div class="field"><label>KM parcursi</label><input type="number" id="km" value="'+(data.km||'')+'" placeholder="0" style="font-family:monospace"></div></div>' +
    '</div></div>' +
    '<div class="section"><div class="sec-head">&#128230; Colete</div><div class="sec-body">' +
      '<div class="colete-wrap">' +
        '<div class="col-half"><label>De livrat</label><input type="number" id="colDL" value="'+(data.colDL||'')+'" placeholder="0" oninput="updateRatio()"><div class="col-ratio" id="ratL">-</div></div>' +
        '<div class="col-half"><label>&#10003; Livrate</label><input type="number" id="colLiv" value="'+(data.colLiv||'')+'" placeholder="0" oninput="updateRatio()"><div class="col-ratio" id="ratR">-</div></div>' +
      '</div>' +
    '</div></div>' +
    '<div class="section"><div class="sec-head">&#128205; Locatii</div><div class="sec-body">' +
      '<div class="loc-list" id="locList"></div>' +
      '<button class="add-loc" onclick="addLoc()">+ Adauga locatie</button>' +
    '</div></div>' +
    '<div class="section"><div class="sec-head">&#128721; Stopuri</div><div class="sec-body">' +
      '<div class="stops-wrap" id="stopsWrap"></div>' +
      '<div class="stop-row"><input type="text" id="stopInp" placeholder="Ex: 12:30 pauza masa" onkeydown="if(event.key===\'Enter\')addStop()"><button onclick="addStop()">+ Add</button></div>' +
    '</div></div>' +
    '<div class="section"><div class="sec-head">&#128666; Masina</div><div class="sec-body">' +
      '<div class="row2"><div class="field"><label>Nr. inmatriculare</label><input type="text" id="nrMas" value="'+(data.nrMas||'')+'" placeholder="B 123 ABC" style="text-transform:uppercase;font-family:monospace" oninput="this.value=this.value.toUpperCase()"></div>' +
      '<div class="field"><label>Tip vehicul</label><select id="tipV"><option value="">- selecteaza -</option><option '+(data.tipV==='Camioneta'?'selected':'')+'>Camioneta</option><option '+(data.tipV==='Autoutilitara'?'selected':'')+'>Autoutilitara</option><option '+(data.tipV==='TIR'?'selected':'')+'>TIR</option><option '+(data.tipV==='Personal'?'selected':'')+'>Personal</option></select></div></div>' +
    '</div></div>' +
    '<div class="section"><div class="sec-head">&#128221; Observatii</div><div class="sec-body">' +
      '<div class="field"><textarea id="obs" placeholder="Note, i
